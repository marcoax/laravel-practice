<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laravel Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f5f2eb; --bg-2: #ede9df;
    --ink: #1a1814; --ink-2: #4a4540; --ink-3: #8a8075;
    --accent: #EB695B; --accent-deep: #c0392b;
    --border: #d5cfc4; --ok: #3f7d5a; --warn: #c9772f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--ink); font-family: 'Libre Baskerville', Georgia, serif; display: flex; overflow: hidden; }

  aside { width: 320px; min-width: 240px; flex-shrink: 0; height: 100%; overflow-y: auto; border-right: 1px solid var(--border); padding: 1.4rem 1rem 2rem; }
  .kicker { font-family: 'JetBrains Mono', monospace; font-size: .6rem; text-transform: uppercase; letter-spacing: .18em; color: var(--accent); margin-bottom: .5rem; }
  aside h1 { font-size: 1.05rem; line-height: 1.3; font-weight: 700; letter-spacing: -.01em; margin-bottom: .8rem; }
  aside h1 em { color: var(--accent); font-style: italic; }
  .scope { font-family: 'JetBrains Mono', monospace; font-size: .62rem; line-height: 1.55; color: var(--ink-2); margin: -.35rem 0 .9rem; }

  .prog-meta { font-family: 'JetBrains Mono', monospace; font-size: .64rem; color: var(--ink-2); display: flex; justify-content: space-between; margin-bottom: .4rem; }
  .prog-meta strong { color: var(--ok); }
  .bar { height: 6px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 1rem; }
  .bar-fill { height: 100%; background: var(--ok); width: 0%; transition: width .35s ease; }

  nav a.item { display: flex; align-items: baseline; gap: .5rem; padding: .45rem .55rem; border-radius: 6px; text-decoration: none; color: var(--ink-2); font-size: .78rem; line-height: 1.45; border: 1px solid transparent; }
  nav a.item:hover { background: var(--bg-2); }
  nav a.item.active { border-color: var(--accent); background: rgba(235,105,91,.08); color: var(--ink); }
  .dot { flex-shrink: 0; width: 9px; height: 9px; border-radius: 50%; border: 1px solid var(--ink-3); position: relative; top: -1px; }
  .dot.done  { background: var(--ok);   border-color: var(--ok); }
  .dot.doing { background: var(--warn); border-color: var(--warn); }
  .item .n { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--accent); flex-shrink: 0; }
  .item .v { font-family: 'JetBrains Mono', monospace; font-size: .6rem; color: var(--ink-3); }
  .item.done .t { text-decoration: line-through; text-decoration-color: var(--ink-3); color: var(--ink-3); }

  .sec-label { font-family: 'JetBrains Mono', monospace; font-size: .58rem; text-transform: uppercase; letter-spacing: .14em; color: var(--ink-3); margin: 1.1rem 0 .3rem .55rem; }

  .side-foot { margin-top: 1.4rem; padding-top: .9rem; border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: .6rem; color: var(--ink-3); line-height: 1.8; }
  .side-foot code { background: var(--bg-2); border: 1px solid var(--border); border-radius: 3px; padding: 0 .3rem; }

  main { flex: 1; height: 100%; display: flex; flex-direction: column; }
  .pane-bar { font-family: 'JetBrains Mono', monospace; font-size: .64rem; color: var(--ink-3); padding: .45rem .9rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; }
  .pane-bar .live { color: var(--ok); }
  #paneTitle { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .note-toggle { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--accent-deep); background: none; border: 1px solid var(--border); border-radius: 4px; padding: .15rem .55rem; cursor: pointer; white-space: nowrap; display: none; }
  .note-toggle.on { border-color: var(--accent); background: rgba(235,105,91,.08); }
  /* Manual status marking (ADR-0018): compact segmented control, one segment
     per state, active segment filled with the state color. */
  .status-seg { display: none; white-space: nowrap; }
  .status-seg button { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--ink-3); background: none; border: 1px solid var(--border); padding: .15rem .5rem; cursor: pointer; }
  .status-seg button:first-child { border-radius: 4px 0 0 4px; }
  .status-seg button + button { border-left: none; }
  .status-seg button:last-child { border-radius: 0 4px 4px 0; }
  .status-seg button.on { color: var(--bg); }
  .status-seg button.on[data-status="todo"]  { background: var(--ink-3); border-color: var(--ink-3); }
  .status-seg button.on[data-status="doing"] { background: var(--warn);  border-color: var(--warn); }
  .status-seg button.on[data-status="done"]  { background: var(--ok);    border-color: var(--ok); }
  .status-err { color: var(--warn); white-space: nowrap; }
  /* Read-only note panel: renders the agent-written `note` from progress.json
     for the active lesson (ADR-0004 channel — no new writer, no new state). */
  .note-panel { display: none; border-bottom: 1px solid var(--border); background: var(--bg-2); padding: .7rem .9rem; font-family: 'JetBrains Mono', monospace; font-size: .7rem; line-height: 1.65; color: var(--ink-2); max-height: 32vh; overflow-y: auto; white-space: pre-wrap; }
  .note-panel.open { display: block; }
  iframe { flex: 1; width: 100%; border: 0; background: #fff; }
  .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--ink-3); font-size: .85rem; font-style: italic; padding: 2rem; text-align: center; }
</style>
</head>
<body>

<aside>
  <div class="kicker">// course</div>
  <h1>Laravel Practice</h1>
  <p class="scope">Laravel 12.x to 13.x · learn by doing</p>
  <div class="prog-meta"><span id="progLabel">0 done</span><span id="progPct">0%</span></div>
  <div class="bar"><div class="bar-fill" id="barFill"></div></div>
  <nav id="nav"></nav>
  <div class="side-foot">
    status &amp; notes auto-sync from <code>progress.json</code><br>
    serve with <code>php -S localhost:8000 scripts/progress-server.php</code>
  </div>
</aside>

<main>
  <div class="pane-bar">
    <span id="paneTitle">no lesson open</span>
    <span id="paneLive"></span>
    <span class="status-err" id="statusErr"></span>
    <span class="status-seg" id="statusSeg">
      <button type="button" data-status="todo">todo</button>
      <button type="button" data-status="doing">doing</button>
      <button type="button" data-status="done">done</button>
    </span>
    <button type="button" class="note-toggle" id="noteToggle">✎ note</button>
  </div>
  <div class="note-panel" id="notePanel"></div>
  <div class="empty" id="empty">Pick a lesson from the sidebar.<br>The page reloads by itself when the agent updates it.</div>
  <iframe id="pane" title="Lesson" style="display:none"></iframe>
</main>

<script>
// One unified catalogue (ADR-0015): core lessons and release lessons in a
// single list, continuous display numbering. `key` is the progress.json key —
// numeric id for the 12 core lessons, version string for release lessons
// (the version stays the identity per ADR-0005/0006; the number is display
// only). /lesson-update appends new release lessons here, in version order.
var ALL_LESSONS = [
  { key:"1",  slug:"01-eloquent-casts",                 title:"Eloquent casts: AsHtmlString, AsCollection::of(), #[UseEloquentBuilder]" },
  { key:"2",  slug:"02-query-builder-pipelines",        title:"Query Builder Pipelines and shouldRun() in migrations" },
  { key:"3",  slug:"03-queue-fail-on-exception",        title:"Queue: FailOnException middleware" },
  { key:"4",  slug:"04-duration-and-http-helpers",      title:"Duration helpers and HTTP Client throwUnless()" },
  { key:"5",  slug:"05-array-collection-gate-helpers",  title:"Array, Collection and Gate helpers (Gate + enum)" },
  { key:"6",  slug:"06-php-83-upgrade",                 title:"PHP 8.3 minimum: upgrade checklist" },
  { key:"7",  slug:"07-php-attributes",                 title:"PHP Attributes in the framework" },
  { key:"8",  slug:"08-csrf-prevent-request-forgery",   title:"CSRF: PreventRequestForgery and Sec-Fetch-Site" },
  { key:"9",  slug:"09-queue-route-interruptible-cache",title:"Queue: route(), Interruptible, Cache::touch()" },
  { key:"10", slug:"10-ai-sdk",                         title:"Laravel AI SDK" },
  { key:"11", slug:"11-vector-search",                  title:"Vector search and semantic search" },
  { key:"12", slug:"12-json-api-resources",             title:"JSON:API Resources" },
  { key:"13.9.0",  slug:"13.9.0",  ver:"13.9",  title:"HTML password rules from your validation rules" },
  { key:"13.12.0", slug:"13.12.0", ver:"13.12", title:"Scheduler metadata & opt-out listener discovery" },
  { key:"13.13.0", slug:"13.13.0", ver:"13.13", title:"Bulk job dispatch with Bus::bulk()" },
  { key:"13.15.0", slug:"13.15.0", ver:"13.15", title:"Typed translation accessors" },
  { key:"13.17.0", slug:"13.17.0", ver:"13.17", title:"First-class route metadata" }
];
// Major-release recaps — the only side section: evolving review pages, not
// course steps, untracked in progress.json (ADR-0014). The lesson lifecycle
// gate adds recap-13x here on its first opt-in creation.
var ALL_RECAPS = [
  { slug:"recap-12x", title:"Recap 12.x" },
  { slug:"recap-13x", title:"Recap 13.x" }
];

var PROGRESS_POLL_MS = 4000;   // sidebar status + notes from progress.json (ADR-0004 channel)
var RELOAD_POLL_MS = 3000;     // active lesson content poll → auto-reload after agent edits

var courseBaselineMajor = 12;  // learning-config.md default; 12 preserves current behavior
var LESSONS = ALL_LESSONS.slice();
var RECAPS = ALL_RECAPS.slice();
var progress = {};             // { "<key>": {status, note} }
var active = null;             // slug of the open lesson
var noteOpen = false;          // note panel visibility (per open lesson)
var lastBody = null;           // snapshot of the open lesson's HTML
var wasMissing = false;        // lesson HTML 404'd — reload as soon as it appears

function lessonUrl(slug){ return "lessons/" + slug + ".html"; }
function lessonMdUrl(slug){ return "lessons/" + slug + ".md"; }
function statusOf(key){ return (progress[key] && progress[key].status) || "todo"; }
function noteOf(key){ return (progress[key] && progress[key].note) || ""; }
function pad2(n){ return (n < 10 ? "0" : "") + n; }
function findBySlug(slug){
  return LESSONS.filter(function(x){ return x.slug===slug; })[0] ||
         RECAPS.filter(function(x){ return x.slug===slug; })[0];
}

function parseCourseBaseline(text){
  var m = text.match(/^\s*course_baseline_major:\s*['"]?(12|13)['"]?\s*$/m);
  return m ? Number(m[1]) : 12;
}

function loadCourseBaseline(){
  return fetch("learning-config.md", {cache:"no-store"})
    .then(function(r){ if(!r.ok) throw 0; return r.text(); })
    .then(parseCourseBaseline)
    .catch(function(){ return 12; });
}

function versionLineFromMarkdown(markdown){
  var m = markdown.match(/^>\s*Version:\s*(.+)$/m);
  return m ? m[1] : "";
}

function lessonMajorFromVersion(versionText){
  var versionSegment = versionText.split("·")[0];
  var majors = [];
  var re = /(?:^|[^\d.])(\d+)(?=\.(?:\d+|x)\b)/g;
  var m;
  while((m = re.exec(versionSegment)) !== null){
    majors.push(Number(m[1]));
  }
  if(!majors.length) return null;
  return Math.min.apply(Math, majors);
}

function loadLessonMetadata(){
  return Promise.all(ALL_LESSONS.map(function(l){
    return fetch(lessonMdUrl(l.slug), {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw 0; return r.text(); })
      .then(function(markdown){
        l.versionText = versionLineFromMarkdown(markdown);
        l.major = lessonMajorFromVersion(l.versionText);
      })
      .catch(function(){
        l.versionText = "";
        l.major = null;
      });
  }));
}

function applyCourseFilters(){
  LESSONS = ALL_LESSONS.filter(function(l){
    return l.major === null || l.major >= courseBaselineMajor;
  });
  RECAPS = ALL_RECAPS.filter(function(x){
    return !(courseBaselineMajor >= 13 && x.slug === "recap-12x");
  });
}

function showEmpty(message){
  active = null;
  document.getElementById("pane").style.display = "none";
  document.getElementById("empty").style.display = "";
  document.getElementById("empty").innerHTML = message;
  document.getElementById("paneTitle").textContent = "no lesson open";
  document.getElementById("paneLive").textContent = "";
  document.getElementById("statusErr").textContent = "";
  renderNav(); renderNote();
}

function renderProgressBar(){
  var done = LESSONS.filter(function(l){ return statusOf(l.key)==="done"; }).length;
  var pct = LESSONS.length ? Math.round(done/LESSONS.length*100) : 0;
  document.getElementById("barFill").style.width = pct+"%";
  document.getElementById("progLabel").innerHTML = "<strong>"+done+"</strong> / "+LESSONS.length+" done";
  document.getElementById("progPct").textContent = pct+"%";
}

function renderNav(){
  var nav = document.getElementById("nav");
  nav.innerHTML = "";
  LESSONS.forEach(function(l, i){
    var st = statusOf(l.key);
    var a = document.createElement("a");
    a.className = "item " + st + (active===l.slug ? " active" : "");
    a.href = "#" + l.slug;
    a.innerHTML = '<span class="dot '+st+'"></span><span class="n">'+pad2(i+1)+'</span>'+
      '<span class="t">'+l.title+(l.ver ? ' <span class="v">('+l.ver+')</span>' : '')+'</span>';
    nav.appendChild(a);
  });
  if(RECAPS.length){
    var lbl = document.createElement("div");
    lbl.className = "sec-label";
    lbl.textContent = "recap";
    nav.appendChild(lbl);
    RECAPS.forEach(function(x){
      var a = document.createElement("a");
      a.className = "item" + (active===x.slug ? " active" : "");
      a.href = "#" + x.slug;
      a.innerHTML = '<span class="dot"></span><span class="t">'+x.title+'</span>';
      nav.appendChild(a);
    });
  }
}

// Read-only note panel: notes remain agent-only (lesson lifecycle gate,
// ADR-0004); the page just displays what progress.json holds for the active
// lesson. Recaps have no key → no note, toggle hidden.
function renderNote(){
  var l = active ? findBySlug(active) : null;
  var note = (l && l.key) ? noteOf(l.key) : "";
  var btn = document.getElementById("noteToggle");
  var panel = document.getElementById("notePanel");
  btn.style.display = note ? "inline-block" : "none";
  btn.className = "note-toggle" + (noteOpen ? " on" : "");
  panel.className = "note-panel" + (note && noteOpen ? " open" : "");
  panel.textContent = note;
  renderStatusSeg();
}

// Manual status marking (ADR-0018): the segmented control shows only when the
// active item has a progress.json key (recaps don't, ADR-0014). Status writes
// go through POST /progress on scripts/progress-server.php — same store the
// agent writes at the gate, so the 4s poll re-syncs both directions.
function renderStatusSeg(){
  var l = active ? findBySlug(active) : null;
  var seg = document.getElementById("statusSeg");
  if(!(l && l.key)){ seg.style.display = "none"; return; }
  seg.style.display = "inline-block";
  var st = statusOf(l.key);
  var btns = seg.getElementsByTagName("button");
  for(var i=0; i<btns.length; i++){
    btns[i].className = btns[i].getAttribute("data-status")===st ? "on" : "";
  }
}

function setStatus(key, status){
  var prev = statusOf(key);
  if(prev === status) return;
  if(!progress[key]) progress[key] = {};
  progress[key].status = status;                    // optimistic update
  document.getElementById("statusErr").textContent = "";
  renderProgressBar(); renderNav(); renderStatusSeg();
  fetch("progress", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({key: key, status: status})
  })
    // Plain `php -S` answers unknown URIs with index.html and a 200, so a
    // status check alone can't detect the missing router — require a JSON body.
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .catch(function(){                              // revert: no write endpoint
      progress[key].status = prev;
      renderProgressBar(); renderNav(); renderStatusSeg();
      document.getElementById("statusErr").textContent =
        "⚠ no write endpoint — serve with scripts/progress-server.php";
    });
}

function showPane(slug){
  document.getElementById("empty").style.display = "none";
  var pane = document.getElementById("pane");
  pane.style.display = "";
  pane.src = lessonUrl(slug);
}

// Not-yet-generated state (issue #58): lesson HTML is per-user and git-ignored,
// generated during a /teach session (recaps on first accept), so a fresh fork
// legitimately has no file yet. Keeps `active` set (selection stays highlighted,
// pollLessonFile keeps polling) unlike showEmpty(), which clears it.
function showNotGenerated(message){
  document.getElementById("pane").style.display = "none";
  var empty = document.getElementById("empty");
  empty.style.display = "";
  empty.innerHTML = message;
}

function openLesson(slug){
  var l = findBySlug(slug);
  if(!l){
    showEmpty("This lesson is outside your active course path.");
    return;
  }
  active = slug;
  lastBody = null;
  wasMissing = false;
  noteOpen = false;
  document.getElementById("paneTitle").textContent = lessonUrl(slug) + " — " + l.title;
  document.getElementById("paneLive").textContent = "";
  document.getElementById("statusErr").textContent = "";
  renderNav(); renderNote();
  fetch(lessonUrl(slug), {cache:"no-store"})
    .then(function(r){ if(!r.ok) throw 0; return r.text(); })
    .then(function(body){
      if(slug !== active) return; // navigated away while the check was in flight
      lastBody = body;
      showPane(slug);
    })
    .catch(function(){
      if(slug !== active) return;
      wasMissing = true; // pollLessonFile reloads the pane the moment it appears
      var isRecap = l.key === undefined;
      showNotGenerated(isRecap
        ? "This recap is created when you first accept adding a completed lesson to it."
        : "\"" + l.title + "\" hasn't been generated yet — run /lesson to generate it.");
    });
}

function onHash(){
  var slug = location.hash.replace(/^#/, "");
  if(slug && slug !== active) openLesson(slug);
}

// Sidebar status + notes: the agent-written progress.json (ADR-0004),
// re-polled so completion recorded at the gate shows up without a refresh.
function pollProgress(){
  fetch("progress.json", {cache:"no-store"})
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(data){
      progress = (data && data.progress) ? data.progress : (data || {});
      renderProgressBar(); renderNav(); renderNote();
    })
    .catch(function(){ /* no progress.json — everything stays todo */ });
}

// Live half of the deepen loop (ADR-0013): when the agent rewrites the open
// lesson file, the fetched content differs from the last snapshot and the
// iframe reloads. Content comparison, not Last-Modified: php -S sends no
// freshness headers for static files. A missing file (the HTML is generated
// mid-session by /teach) keeps polling and reloads on first appearance.
function reloadPane(slug){
  document.getElementById("empty").style.display = "none";
  var pane = document.getElementById("pane");
  pane.style.display = "";
  pane.src = lessonUrl(slug) + "?t=" + Date.now();
  document.getElementById("paneLive").textContent = "↻ updated " + new Date().toLocaleTimeString();
  document.getElementById("paneLive").className = "live";
}
function pollLessonFile(){
  if(!active) return;
  var slug = active;
  fetch(lessonUrl(slug), {cache:"no-store"})
    .then(function(r){
      if(!r.ok){ if(slug === active) wasMissing = true; return null; }
      return r.text();
    })
    .then(function(body){
      if(body === null || slug !== active) return;
      if(wasMissing || (lastBody !== null && body !== lastBody)) reloadPane(slug);
      wasMissing = false;
      lastBody = body;
    })
    .catch(function(){ /* transient — keep polling */ });
}

document.getElementById("noteToggle").onclick = function(){
  noteOpen = !noteOpen;
  renderNote();
};

document.getElementById("statusSeg").onclick = function(e){
  var status = e.target.getAttribute && e.target.getAttribute("data-status");
  var l = active ? findBySlug(active) : null;
  if(status && l && l.key) setStatus(l.key, status);
};

window.addEventListener("hashchange", onHash);
function init(){
  Promise.all([loadCourseBaseline(), loadLessonMetadata()])
    .then(function(results){
      courseBaselineMajor = results[0];
      applyCourseFilters();
      renderNav(); renderProgressBar(); renderNote();
      pollProgress(); onHash();
      setInterval(pollProgress, PROGRESS_POLL_MS);
      setInterval(pollLessonFile, RELOAD_POLL_MS);
    });
}

init();
</script>
</body>
</html>
